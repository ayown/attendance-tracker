upstream web {
    server web:3000;
}

upstream auth_service {
    server auth-service:3001;
}

upstream user_service {
    server user-service:3002;
}

upstream attendance_service {
    server attendance-service:3003;
}

upstream schedule_service {
    server schedule-service:3004;
}

upstream notification_service {
    server notification-service:3005;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 10M;

    # Frontend
    location / {
        proxy_pass http://web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Auth API
    location /api/auth/ {
        proxy_pass http://auth_service/api/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # User API
    location /api/users/ {
        proxy_pass http://user_service/api/users/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Attendance API + WebSocket
    location /api/attendance/ {
        proxy_pass http://attendance_service/api/attendance/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /socket.io/ {
        proxy_pass http://attendance_service;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Schedule API
    location /api/schedules/ {
        proxy_pass http://schedule_service/api/schedules/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
